name: Release & Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # Publish tasksync-mcp (MCP server) on v* tags
  publish-server:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publish opencode-tasksync (OpenCode plugin) on plugin-v* tags
  publish-plugin:
    if: startsWith(github.event.release.tag_name, 'plugin-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install plugin dependencies
        run: npm ci --ignore-scripts
        working-directory: opencode-plugin

      - name: Build plugin
        run: npx tsc
        working-directory: opencode-plugin

      - name: Verify version matches tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PKG_VERSION="plugin-v$(node -p "require('./opencode-plugin/package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match opencode-plugin/package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        working-directory: opencode-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
